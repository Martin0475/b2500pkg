                target:
                  entity_id: input_number.b2500_08_status
                data:
                  value: -1

  b2500_09_worker:
    alias: B2500PKG_B09_Worker
    mode: queued
    max: 50

    fields:
      payload:
        required: true
        selector:
          text:
      followup_payload:
        required: false
        default: ""
        selector:
          text:
      no_check:
        required: false
        default: false
        selector:
          boolean:
      expected_value:
        required: false
        default: ""
        selector:
          text:
      expected_field:
        required: false
        default: ""
        selector:
          text:

    sequence:
      - variables:
          mqtt_topic: "{{ states('input_text.b09_topic') }}/{{ states('input_text.b09_typ') }}/App/{{ states('input_text.b09_mac') }}/ctrl"
          mqtt_mac: "{{ states('input_text.b09_mac') }}"
          payload_clean: "{{ payload | default('', true) | string | trim }}"
          followup_payload_clean: "{{ followup_payload | default('', true) | string | trim }}"
          no_check_clean: "{{ no_check | default(false) }}"
          expected_value_clean: "{{ expected_value | default('', true) | string | trim }}"
          expected_field_clean: "{{ expected_field | default('', true) | string | trim | lower }}"
          wait_command: "{{ followup_payload_clean if followup_payload_clean != '' else payload_clean }}"
          wait_topic: >-
            {% if wait_command == 'cd=01' %}
              B2500PKG/B2500_09/CD01/last_updated
            {% elif wait_command == 'cd=13' %}
              B2500PKG/B2500_09/CD13/last_updated
            {% elif wait_command == 'cd=15' %}
              B2500PKG/B2500_09/CD15/last_updated
            {% elif wait_command == 'cd=16' %}
              B2500PKG/B2500_09/CD16/last_updated
            {% else %}
              B2500PKG/B2500_09/CD01/last_updated
            {% endif %}
          sensor_entity: "{{ 'sensor.b2500_09_' ~ expected_field_clean if expected_field_clean != '' else '' }}"
          text_fields: ['e1','e2','e3','e4','e5','f1','f2','f3','f4','f5']

      - if:
          - condition: template
            value_template: '{{ payload_clean == "" }}'
        then:
          - stop: "Kein payload → Abbruch"

      - if:
          - condition: template
            value_template: '{{ mqtt_mac in ["", "unknown", "unavailable", "none", None] }}'
        then:
          - stop: "MAC ungültig → Abbruch"

      - if:
          - condition: template
            value_template: '{{ expected_value_clean != "" and expected_field_clean == "" }}'
        then:
          - stop: "expected_field fehlt obwohl expected_value gesetzt ist → Abbruch"

      - service: mqtt.publish
        data:
          topic: "{{ mqtt_topic }}"
          payload: "{{ payload_clean }}"
          qos: 1

      - if:
          - condition: template
            value_template: '{{ followup_payload_clean != "" }}'
        then:
          - delay:
              seconds: 3
          - service: mqtt.publish
            data:
              topic: "{{ mqtt_topic }}"
              payload: "{{ followup_payload_clean }}"
              qos: 1

      - if:
          - condition: template
            value_template: '{{ no_check_clean == true }}'
        then:
          - stop: "no_check aktiv → Ende nach dem Senden"

      - service: input_number.set_value
        target:
          entity_id: input_number.b2500_09_status
        data:
          value: 1

      - wait_for_trigger:
          - trigger: mqtt
            topic: "{{ wait_topic }}"
        timeout: "00:00:10"
        continue_on_timeout: true

      - variables:
          actual_state_first: "{{ states(sensor_entity) if sensor_entity != '' else '' }}"
          first_ok: >-
            {% if wait.trigger is none %}
              false
            {% elif expected_value_clean == '' %}
              true
            {% elif sensor_entity == '' or actual_state_first in ['unknown', 'unavailable', 'none', None] %}
              false
            {% elif expected_field_clean in text_fields %}
              {{ actual_state_first | string == expected_value_clean | string }}
            {% else %}
              {{ actual_state_first | float(999999999) == expected_value_clean | float(999999998) }}
            {% endif %}

      - if:
          - condition: template
            value_template: '{{ first_ok }}'
        then:
          - service: input_number.set_value
            target:
              entity_id: input_number.b2500_09_status
            data:
              value: 3
        else:
          - service: input_number.set_value
            target:
              entity_id: input_number.b2500_09_status
            data:
              value: 2

          - service: mqtt.publish
            data:
              topic: "{{ mqtt_topic }}"
              payload: "{{ payload_clean }}"
              qos: 1

          - if:
              - condition: template
                value_template: '{{ followup_payload_clean != "" }}'
            then:
              - delay:
                  seconds: 3
              - service: mqtt.publish
                data:
                  topic: "{{ mqtt_topic }}"
                  payload: "{{ followup_payload_clean }}"
                  qos: 1

          - wait_for_trigger:
              - trigger: mqtt
                topic: "{{ wait_topic }}"
            timeout: "00:00:10"
            continue_on_timeout: true

          - variables:
              actual_state_second: "{{ states(sensor_entity) if sensor_entity != '' else '' }}"
              second_ok: >-
                {% if wait.trigger is none %}
                  false
                {% elif expected_value_clean == '' %}
                  true
                {% elif sensor_entity == '' or actual_state_second in ['unknown', 'unavailable', 'none', None] %}
                  false
                {% elif expected_field_clean in text_fields %}
                  {{ actual_state_second | string == expected_value_clean | string }}
                {% else %}
                  {{ actual_state_second | float(999999999) == expected_value_clean | float(999999998) }}
                {% endif %}

          - if:
              - condition: template
                value_template: '{{ second_ok }}'
            then:
              - service: input_number.set_value
                target:
                  entity_id: input_number.b2500_09_status
                data:
                  value: 3
            else:
              - service: input_number.set_value
                target:
                  entity_id: input_number.b2500_09_status
                data:
                  value: -1
