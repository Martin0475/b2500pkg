input_select:
  surplus:
    name: Surplus Modus
    options:
      - "Überschusseinspeisung an"
      - "Überschusseinspeisung aus"

script:
  b2500pkg_set_surplus:
    alias: B2500PKG_Set_Surplus
    description: "Setzt den Surplus-/Überschusseinspeisungsmodus für einen oder alle B2500-Speicher."
    fields:
      speicher:
        description: Speicher-ID, z. B. b2500_01 oder Alle_Speicher. Wenn leer, wird input_select.speicherauswahl verwendet.
        required: false
        example: "b2500_01"
      surplus:
        description: Surplus Modus. Wenn leer, wird input_select.surplus verwendet.
        required: false
        example: "Überschusseinspeisung an"
    sequence:
      - variables:
          speicher: "{{ speicher | default(states('input_select.speicherauswahl'), true) }}"
          surplus_mode: "{{ surplus | default(states('input_select.surplus'), true) }}"
          surplus_value: >-
            {% if surplus_mode == 'Überschusseinspeisung an' %}
              0
            {% else %}
              1
            {% endif %}
          surplus_expected: >-
            {% if surplus_mode == 'Überschusseinspeisung an' %}
              Surplus Modus aktiv
            {% else %}
              Surplus Modus deaktiviert
            {% endif %}  
          surplus_payload: "cd=31,touchuan_disa={{ surplus_value | int }}"
          all_speicher: "{{ states('input_text.b2500_all') | from_json }}"
          targets: >
            {% if speicher == 'Alle_Speicher' %}
              {{ all_speicher }}
            {% else %}
              {{ [speicher] }}
            {% endif %}

      - repeat:
          for_each: "{{ targets }}"
          sequence:
            - action: script.turn_on
              target:
                entity_id: "script.{{ repeat.item }}_worker"
              data:
                variables:
                  payload: "{{ surplus_payload }}"
                  followup_payload: "cd=01"
                  no_check: false
                  expected_field: "tc_dis"
                  expected_value: "{{ surplus_expected }}"

            - delay:
                seconds: 1

    mode: queued
    max: 10
