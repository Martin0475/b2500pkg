automation:
  alias: B2500PKG Set Timer
  description: |+
  id: "0007"

  triggers:
    - trigger: state
      entity_id:
        - input_button.b2500_leistung_setzen
      id: leistung_setzen
    - trigger: state
      entity_id:
        - input_button.b2500_timer_status_setzen
      id: timer_status_setzen
    - trigger: state
      entity_id:
        - input_button.zeit_setzen
      id: zeit_setzen
    - trigger: state
      entity_id:
        - input_button.b2500_selbstanpassung
      id: selbstanpassung_setzen

  conditions: []

  actions:
    - variables:
        speicher: "{{ states('input_select.speicherauswahl') }}"
        all_speicher: "{{ states('input_text.b2500_all') | from_json }}"
        targets: >
          {% if speicher == 'Alle_Speicher' %}
            {{ all_speicher }}
          {% else %}
            {{ [speicher] }}
          {% endif %}
        timerslot: "{{ states('input_select.timerslot') | int }}"
        timer_leistung: "{{ states('input_number.timer_leistung') | int }}"
        timer_status_value: "{{ 1 if is_state('input_boolean.timer_aktiv', 'on') else 0 }}"
        startzeit: "{{ states('input_datetime.timer_beginn') }}"
        endzeit: "{{ states('input_datetime.timer_ende') }}"
        
    - choose:
        - conditions:
            - condition: trigger
              id:
                - leistung_setzen
          sequence:
            - repeat:
                for_each: "{{ targets }}"
                sequence:
                  - variables:
                      num: "{{ repeat.item.split('_')[-1] }}"

                      a1: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d1','on') else 0 }}"
                      a2: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d2','on') else 0 }}"
                      a3: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d3','on') else 0 }}"
                      a4: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d4','on') else 0 }}"
                      a5: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d5','on') else 0 }}"

                      b1: "{{ states('sensor.b2500_' ~ num ~ '_e1') }}"
                      b2: "{{ states('sensor.b2500_' ~ num ~ '_e2') }}"
                      b3: "{{ states('sensor.b2500_' ~ num ~ '_e3') }}"
                      b4: "{{ states('sensor.b2500_' ~ num ~ '_e4') }}"
                      b5: "{{ states('sensor.b2500_' ~ num ~ '_e5') }}"

                      e1: "{{ states('sensor.b2500_' ~ num ~ '_f1') }}"
                      e2: "{{ states('sensor.b2500_' ~ num ~ '_f2') }}"
                      e3: "{{ states('sensor.b2500_' ~ num ~ '_f3') }}"
                      e4: "{{ states('sensor.b2500_' ~ num ~ '_f4') }}"
                      e5: "{{ states('sensor.b2500_' ~ num ~ '_f5') }}"

                      v1: >-
                        {{ timer_leistung if timerslot == 1
                        else states('sensor.b2500_' ~ num ~ '_h1') | int }}
                      v2: >-
                        {{ timer_leistung if timerslot == 2
                        else states('sensor.b2500_' ~ num ~ '_h2') | int }}
                      v3: >-
                        {{ timer_leistung if timerslot == 3
                        else states('sensor.b2500_' ~ num ~ '_h3') | int }}
                      v4: >-
                        {{ timer_leistung if timerslot == 4
                        else states('sensor.b2500_' ~ num ~ '_h4') | int }}
                      v5: >-
                        {{ timer_leistung if timerslot == 5
                        else states('sensor.b2500_' ~ num ~ '_h5') | int }}

                      expected_field: "h{{ timerslot }}"
                      expected_value: "{{ timer_leistung }}"

                      timer_payload: >-
                        cd=20,md=0,a1={{ a1 }},b1={{ b1 }},e1={{ e1 }},v1={{ v1 }},a2={{ a2 }},b2={{ b2 }},e2={{ e2 }},v2={{ v2 }},a3={{ a3 }},b3={{ b3 }},e3={{ e3 }},v3={{ v3 }},a4={{ a4 }},b4={{ b4 }},e4={{ e4 }},v4={{ v4 }},a5={{ a5 }},b5={{ b5 }},e5={{ e5 }},v5={{ v5 }}

                  - action: script.turn_on
                    target:
                      entity_id: "script.{{ repeat.item }}_worker"
                    data:
                      variables:
                        payload: "{{ timer_payload }}"
                        followup_payload: "cd=01"
                        no_check: false
                        expected_field: "{{ expected_field }}"
                        expected_value: "{{ expected_value }}"

                  - delay:
                      seconds: 1
          
        - conditions:
            - condition: trigger
              id:
                - timer_status_setzen
          sequence:
            - repeat:
                for_each: "{{ targets }}"
                sequence:
                  - variables:
                      num: "{{ repeat.item.split('_')[-1] }}"
        
                      a1: "{{ timer_status_value if timerslot == 1 else (1 if is_state('binary_sensor.b2500_' ~ num ~ '_d1','on') else 0) }}"
                      a2: "{{ timer_status_value if timerslot == 2 else (1 if is_state('binary_sensor.b2500_' ~ num ~ '_d2','on') else 0) }}"
                      a3: "{{ timer_status_value if timerslot == 3 else (1 if is_state('binary_sensor.b2500_' ~ num ~ '_d3','on') else 0) }}"
                      a4: "{{ timer_status_value if timerslot == 4 else (1 if is_state('binary_sensor.b2500_' ~ num ~ '_d4','on') else 0) }}"
                      a5: "{{ timer_status_value if timerslot == 5 else (1 if is_state('binary_sensor.b2500_' ~ num ~ '_d5','on') else 0) }}"
        
                      b1: "{{ states('sensor.b2500_' ~ num ~ '_e1') }}"
                      b2: "{{ states('sensor.b2500_' ~ num ~ '_e2') }}"
                      b3: "{{ states('sensor.b2500_' ~ num ~ '_e3') }}"
                      b4: "{{ states('sensor.b2500_' ~ num ~ '_e4') }}"
                      b5: "{{ states('sensor.b2500_' ~ num ~ '_e5') }}"
        
                      e1: "{{ states('sensor.b2500_' ~ num ~ '_f1') }}"
                      e2: "{{ states('sensor.b2500_' ~ num ~ '_f2') }}"
                      e3: "{{ states('sensor.b2500_' ~ num ~ '_f3') }}"
                      e4: "{{ states('sensor.b2500_' ~ num ~ '_f4') }}"
                      e5: "{{ states('sensor.b2500_' ~ num ~ '_f5') }}"
        
                      v1: "{{ states('sensor.b2500_' ~ num ~ '_h1') | int }}"
                      v2: "{{ states('sensor.b2500_' ~ num ~ '_h2') | int }}"
                      v3: "{{ states('sensor.b2500_' ~ num ~ '_h3') | int }}"
                      v4: "{{ states('sensor.b2500_' ~ num ~ '_h4') | int }}"
                      v5: "{{ states('sensor.b2500_' ~ num ~ '_h5') | int }}"
        
                      expected_field: "d{{ timerslot }}"
                      expected_value: "{{ timer_status_value }}"
        
                      timer_payload: >-
                        cd=20,md=0,
                        a1={{ a1 }},b1={{ b1 }},e1={{ e1 }},v1={{ v1 }},
                        a2={{ a2 }},b2={{ b2 }},e2={{ e2 }},v2={{ v2 }},
                        a3={{ a3 }},b3={{ b3 }},e3={{ e3 }},v3={{ v3 }},
                        a4={{ a4 }},b4={{ b4 }},e4={{ e4 }},v4={{ v4 }},
                        a5={{ a5 }},b5={{ b5 }},e5={{ e5 }},v5={{ v5 }}
        
                  - action: script.turn_on
                    target:
                      entity_id: "script.{{ repeat.item }}_worker"
                    data:
                      variables:
                        payload: "{{ timer_payload }}"
                        followup_payload: "cd=01"
                        no_check: false
                        expected_field: "{{ expected_field }}"
                        expected_value: "{{ expected_value }}"
        
                  - delay:
                      seconds: 1

        - conditions:
            - condition: trigger
              id:
                - zeit_setzen
          sequence:
            - repeat:
                for_each: "{{ targets }}"
                sequence:
                  - variables:
                      num: "{{ repeat.item.split('_')[-1] }}"

                      a1: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d1','on') else 0 }}"
                      a2: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d2','on') else 0 }}"
                      a3: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d3','on') else 0 }}"
                      a4: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d4','on') else 0 }}"
                      a5: "{{ 1 if is_state('binary_sensor.b2500_' ~ num ~ '_d5','on') else 0 }}"

                      b1: "{{ states('sensor.b2500_' ~ num ~ '_e1') }}"
                      b2: "{{ states('sensor.b2500_' ~ num ~ '_e2') }}"
                      b3: "{{ states('sensor.b2500_' ~ num ~ '_e3') }}"
                      b4: "{{ states('sensor.b2500_' ~ num ~ '_e4') }}"
                      b5: "{{ states('sensor.b2500_' ~ num ~ '_e5') }}"

                      e1: "{{ states('sensor.b2500_' ~ num ~ '_f1') }}"
                      e2: "{{ states('sensor.b2500_' ~ num ~ '_f2') }}"
                      e3: "{{ states('sensor.b2500_' ~ num ~ '_f3') }}"
                      e4: "{{ states('sensor.b2500_' ~ num ~ '_f4') }}"
                      e5: "{{ states('sensor.b2500_' ~ num ~ '_f5') }}"

                      v1: "{{ states('sensor.b2500_' ~ num ~ '_h1') | int }}"
                      v2: "{{ states('sensor.b2500_' ~ num ~ '_h2') | int }}"
                      v3: "{{ states('sensor.b2500_' ~ num ~ '_h3') | int }}"
                      v4: "{{ states('sensor.b2500_' ~ num ~ '_h4') | int }}"
                      v5: "{{ states('sensor.b2500_' ~ num ~ '_h5') | int }}"

                      start_h: "{{ startzeit.split(':')[0] | int }}"
                      start_m: "{{ startzeit.split(':')[1] | int }}"
                      end_h: "{{ endzeit.split(':')[0] | int }}"
                      end_m: "{{ endzeit.split(':')[1] | int }}"

                      new_b: "{{ start_h ~ ':' ~ start_m }}"
                      new_e: "{{ end_h ~ ':' ~ end_m }}"

                      b1_new: "{{ new_b if timerslot == 1 else states('sensor.b2500_' ~ num ~ '_e1') }}"
                      b2_new: "{{ new_b if timerslot == 2 else states('sensor.b2500_' ~ num ~ '_e2') }}"
                      b3_new: "{{ new_b if timerslot == 3 else states('sensor.b2500_' ~ num ~ '_e3') }}"
                      b4_new: "{{ new_b if timerslot == 4 else states('sensor.b2500_' ~ num ~ '_e4') }}"
                      b5_new: "{{ new_b if timerslot == 5 else states('sensor.b2500_' ~ num ~ '_e5') }}"

                      e1_new: "{{ new_e if timerslot == 1 else states('sensor.b2500_' ~ num ~ '_f1') }}"
                      e2_new: "{{ new_e if timerslot == 2 else states('sensor.b2500_' ~ num ~ '_f2') }}"
                      e3_new: "{{ new_e if timerslot == 3 else states('sensor.b2500_' ~ num ~ '_f3') }}"
                      e4_new: "{{ new_e if timerslot == 4 else states('sensor.b2500_' ~ num ~ '_f4') }}"
                      e5_new: "{{ new_e if timerslot == 5 else states('sensor.b2500_' ~ num ~ '_f5') }}"

                      expected_field: "e{{ timerslot }}"
                      expected_value: "{{ new_b }}"
                      expected_field_2: "f{{ timerslot }}"
                      expected_value_2: "{{ new_e }}"

                      timer_payload: >-
                        cd=20,md=0,
                        a1={{ a1 }},b1={{ b1_new }},e1={{ e1_new }},v1={{ v1 }},
                        a2={{ a2 }},b2={{ b2_new }},e2={{ e2_new }},v2={{ v2 }},
                        a3={{ a3 }},b3={{ b3_new }},e3={{ e3_new }},v3={{ v3 }},
                        a4={{ a4 }},b4={{ b4_new }},e4={{ e4_new }},v4={{ v4 }},
                        a5={{ a5 }},b5={{ b5_new }},e5={{ e5_new }},v5={{ v5 }}

                  - action: script.turn_on
                    target:
                      entity_id: "script.{{ repeat.item }}_worker"
                    data:
                      variables:
                        payload: "{{ timer_payload }}"
                        followup_payload: "cd=01"
                        no_check: false
                        expected_field: "{{ expected_field }}"
                        expected_value: "{{ expected_value }}"
                        expected_field_2: "{{ expected_field_2 }}"
                        expected_value_2: "{{ expected_value_2 }}"

                  - delay:
                      seconds: 1


        - conditions:
            - condition: trigger
              id:
                - selbstanpassung_setzen
          sequence:
            - repeat:
                for_each: "{{ targets }}"
                sequence:
                  - variables:
                      expected_field: "md"
                      expected_value: "Selbstanpassung"

                  - action: script.turn_on
                    target:
                      entity_id: "script.{{ repeat.item }}_worker"
                    data:
                      variables:
                        payload: "cd=20,md=1"
                        followup_payload: "cd=01"
                        no_check: false
                        expected_field: "{{ expected_field }}"
                        expected_value: "{{ expected_value }}"

                  - delay:
                      seconds: 1
              
              
  mode: queued
  max: 20
